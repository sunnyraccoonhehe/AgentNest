
services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: calendar_postgres
    environment:
      POSTGRES_DB: calendar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calendar_network

  # Spring Boot приложение
  app:
    build:
      context: .
      dockerfile: src/main/java/com/agent_nest/Dockerfile
    container_name: calendar_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/calendar_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - calendar_network

networks:
  calendar_network:
    driver: bridge

volumes:
  postgres_data: